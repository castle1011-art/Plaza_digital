        body { -webkit-tap-highlight-color: transparent; }
        .no-scrollbar::-scrollbar { display: none; }

    <!-- TU CONTENIDO HTML SE MANTIENE IGUAL -->
    <div class="bg-slate-900 text-white divide-y divide-slate-800 shadow-sm sticky top-0 z-50">

            <div id="top-alert-bar" class="bg-emerald-600 text-white px-4 py-2 text-xs text-center font-bold flex justify-center items-center gap-1.5">

        </div>
        <div class="px-4 py-2 bg-slate-900 flex justify-between items-center text-[11px] text-slate-300 font-medium">

                <span id="clima-viento"><i class="fa-solid fa-wind text-sky-400 mr-1"></i> Viento: -- nudos</span>
            </div>
            <div onclick="verUltimaNotificacion()" class="relative cursor-pointer flex items-center pr-1 p-1 rounded-sm hover:bg-slate-800 transition">
                <i class="fa-solid fa-bell text-sm text-slate-300"></i>
                <span id="badge-notif" class="hidden absolute top-1 right-1 bg-red-500 w-2.5 h-2.5 rounded-full border border-slate-900"></span>
